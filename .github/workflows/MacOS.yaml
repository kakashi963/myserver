name: macOS Remote Access (RDP)

on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 355

    steps:
      - name: Enable SSH
        run: |
          sudo systemsetup -setremotelogin on
          echo "✅ SSH enabled"

      - name: Create Remote User
        run: |
          PASSWORD=$(openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | head -c 20)

          sudo dscl . -delete /Users/RemoteUser 2>/dev/null || true
          sudo dscl . -create /Users/RemoteUser
          sudo dscl . -create /Users/RemoteUser UserShell /bin/zsh
          sudo dscl . -create /Users/RemoteUser RealName "Remote User"
          sudo dscl . -create /Users/RemoteUser UniqueID "601"
          sudo dscl . -create /Users/RemoteUser PrimaryGroupID "20"
          sudo dscl . -create /Users/RemoteUser NFSHomeDirectory /Users/RemoteUser
          sudo dscl . -passwd /Users/RemoteUser "$PASSWORD"
          sudo dscl . -append /Groups/admin GroupMembership RemoteUser
          sudo createhomedir -c -u RemoteUser 2>/dev/null || true

          echo "REMOTE_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "✅ User RemoteUser created"

      - name: Install XQuartz + xrdp dependencies
        run: |
          # Install xquartz for display, xrdp for RDP server
          brew install xquartz 2>/dev/null || true
          brew install xrdp 2>/dev/null || true

          # If xrdp not in brew, build from source via a known tap
          if ! command -v xrdp &>/dev/null; then
            echo "xrdp not found via brew, trying alternative..."
            brew install neutrinolabs/xrdp/xrdp 2>/dev/null || true
          fi

          echo "✅ Packages installed"

      - name: Install Tailscale
        run: |
          brew install tailscale
          echo "✅ Tailscale installed: $(tailscale version)"

      - name: Configure and Start xrdp
        run: |
          # Find xrdp sbin path
          XRDP_BIN=$(which xrdp 2>/dev/null || find /usr/local /opt/homebrew -name "xrdp" -type f 2>/dev/null | head -1)

          if [ -z "$XRDP_BIN" ]; then
            echo "❌ xrdp binary not found"
            exit 1
          fi

          echo "xrdp found at: $XRDP_BIN"

          # Get config dir
          XRDP_ETC=$(dirname $(dirname $XRDP_BIN))/etc/xrdp
          [ ! -d "$XRDP_ETC" ] && XRDP_ETC=/usr/local/etc/xrdp
          [ ! -d "$XRDP_ETC" ] && XRDP_ETC=/opt/homebrew/etc/xrdp

          echo "xrdp config at: $XRDP_ETC"

          # Start xrdp
          sudo "$XRDP_BIN" 2>/dev/null &
          sleep 5

          # Start xrdp-sesman (session manager)
          SESMAN_BIN=$(which xrdp-sesman 2>/dev/null || find /usr/local /opt/homebrew -name "xrdp-sesman" -type f 2>/dev/null | head -1)
          if [ -n "$SESMAN_BIN" ]; then
            sudo "$SESMAN_BIN" 2>/dev/null &
            sleep 3
          fi

          echo "✅ xrdp started"

      - name: Start Tailscale
        run: |
          sudo mkdir -p /var/lib/tailscale

          sudo tailscaled \
            --state=/var/lib/tailscale/tailscaled.state \
            --tun=userspace-networking &
          sleep 8

          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-mac-$GITHUB_RUN_ID \
            --accept-routes \
            --accept-dns=false

          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ "$RETRIES" -lt 30 ]; do
            TS_IP=$(sudo tailscale ip -4 2>/dev/null | head -n1 | tr -d '[:space:]')
            [ -z "$TS_IP" ] && echo "Waiting... ($((RETRIES+1))/30)" && sleep 5
            RETRIES=$((RETRIES+1))
          done

          if [ -z "$TS_IP" ]; then
            echo "❌ Could not get Tailscale IP"
            exit 1
          fi

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TS_IP"

      - name: Verify Ports
        run: |
          nc -z -G5 "$TAILSCALE_IP" 3389 && echo "✅ RDP :3389 OPEN" || echo "⚠️  RDP :3389 not open yet"
          nc -z -G5 "$TAILSCALE_IP" 22   && echo "✅ SSH :22   OPEN" || echo "⚠️  SSH :22   not open"

      - name: Connection Info
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║     macOS REMOTE ACCESS READY (RDP)          ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Tailscale IP : $TAILSCALE_IP"
          echo "║  RDP Address  : $TAILSCALE_IP:3389"
          echo "║  SSH Address  : ssh RemoteUser@$TAILSCALE_IP"
          echo "║  Username     : RemoteUser"
          echo "║  Password     : $REMOTE_PASSWORD"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "Windows: Start → Remote Desktop Connection → $TAILSCALE_IP"
          echo "OR download Microsoft Remote Desktop from Microsoft Store"
          echo ""
          echo "Make sure Tailscale is running on YOUR machine!"
          echo "Cancel this workflow when done."

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] Session active — cancel workflow to terminate"
            sleep 60
          done
