name: macOS Remote Access

on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 355

    steps:
      - name: Enable SSH
        run: |
          sudo systemsetup -setremotelogin on
          echo "✅ SSH enabled"

      - name: Create Remote User
        run: |
          PASSWORD=$(openssl rand -base64 32 | tr -dc 'A-Za-z0-9' | head -c 20)

          sudo dscl . -delete /Users/RemoteUser 2>/dev/null || true

          sudo dscl . -create /Users/RemoteUser
          sudo dscl . -create /Users/RemoteUser UserShell /bin/zsh
          sudo dscl . -create /Users/RemoteUser RealName "Remote User"
          sudo dscl . -create /Users/RemoteUser UniqueID "601"
          sudo dscl . -create /Users/RemoteUser PrimaryGroupID "20"
          sudo dscl . -create /Users/RemoteUser NFSHomeDirectory /Users/RemoteUser
          sudo dscl . -passwd /Users/RemoteUser "$PASSWORD"
          sudo dscl . -append /Groups/admin GroupMembership RemoteUser
          sudo createhomedir -c -u RemoteUser 2>/dev/null || true

          echo "REMOTE_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "✅ User RemoteUser created"

      - name: Enable and Configure VNC
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -allowAccessFor -allUsers \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -setvncpw -vncpw "$REMOTE_PASSWORD" \
            -restart -agent -verbose
          sleep 5
          echo "✅ VNC configured"

      - name: Wake GUI Session (Safe)
        run: |
          # DO NOT touch WindowServer via launchctl — it kills the runner
          # Instead, gently open apps to trigger GUI activity

          # Open Finder (safe, non-destructive)
          open /System/Applications/Finder.app 2>/dev/null || true
          sleep 5

          # Find available wallpaper and set it
          WALLPAPER=""
          for pic in \
            "/System/Library/Desktop Pictures/Sequoia.heic" \
            "/System/Library/Desktop Pictures/Sonoma.heic" \
            "/System/Library/Desktop Pictures/Ventura.heic" \
            "/System/Library/Desktop Pictures/Monterey.heic" \
            "/System/Library/Desktop Pictures/Big Sur.heic" \
            "/Library/Desktop Pictures/Mojave.jpg" \
            "/System/Library/Desktop Pictures/Catalina.heic"; do
            if [ -f "$pic" ]; then
              WALLPAPER="$pic"
              break
            fi
          done

          if [ -n "$WALLPAPER" ]; then
            osascript -e "tell application \"Finder\" to set desktop picture to POSIX file \"$WALLPAPER\"" 2>/dev/null || true
            echo "✅ Wallpaper set: $WALLPAPER"
          else
            echo "⚠️ No wallpaper found, skipping"
          fi

          # Restart ARD gently
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -restart -agent 2>/dev/null || true
          sleep 3

          echo "✅ GUI session ready"

      - name: Install Tailscale
        run: |
          brew install tailscale
          echo "✅ Tailscale installed: $(tailscale version)"

      - name: Start Tailscale
        run: |
          sudo mkdir -p /var/lib/tailscale

          sudo tailscaled \
            --state=/var/lib/tailscale/tailscaled.state \
            --tun=userspace-networking &
          sleep 8

          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-mac-$GITHUB_RUN_ID \
            --accept-routes \
            --accept-dns=false

          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ "$RETRIES" -lt 30 ]; do
            TS_IP=$(sudo tailscale ip -4 2>/dev/null | head -n1 | tr -d '[:space:]')
            [ -z "$TS_IP" ] && echo "Waiting... ($((RETRIES+1))/30)" && sleep 5
            RETRIES=$((RETRIES+1))
          done

          if [ -z "$TS_IP" ]; then
            echo "❌ Could not get Tailscale IP"
            sudo tailscale status
            exit 1
          fi

          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TS_IP"

      - name: Verify Ports
        run: |
          nc -z -G5 "$TAILSCALE_IP" 5900 && echo "✅ VNC :5900 OPEN" || echo "⚠️  VNC :5900 not open yet"
          nc -z -G5 "$TAILSCALE_IP" 22   && echo "✅ SSH :22   OPEN" || echo "⚠️  SSH :22   not open yet"

      - name: Connection Info
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║       macOS REMOTE ACCESS IS READY           ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "║  Tailscale IP : $TAILSCALE_IP"
          echo "║  VNC Address  : $TAILSCALE_IP:5900"
          echo "║  SSH Address  : ssh RemoteUser@$TAILSCALE_IP"
          echo "║  Username     : RemoteUser"
          echo "║  Password     : $REMOTE_PASSWORD"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "TigerVNC → $TAILSCALE_IP:5900 → password from above"
          echo "Make sure Tailscale is running on YOUR machine too!"
          echo "Cancel this workflow when done."

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] Session active — cancel workflow to terminate"
            sleep 60
          done
