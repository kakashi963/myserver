Run # Enable Screen Sharing (VNC)
  # Enable Screen Sharing (VNC)
  sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist
  
  # Set VNC password
  sudo defaults write /Library/Preferences/com.apple.RemoteManagement.plist VNCLegacyConnectionsEnabled -bool true
  
  # Generate random password
  PASSWORD=$(cat /dev/urandom | LC_ALL=C tr -dc 'A-Za-z0-9@#$%' | head -c 16)
  
  # Set the VNC password
  sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
    -activate -configure -access -on \
    -clientopts -setvnclegacy -vnclegacy yes \
    -clientopts -setvncpwd -vncpwd "$PASSWORD" \
    -restart -agent -privs -all
  
  echo "VNC_PASSWORD=$PASSWORD" >> $GITHUB_ENV
  shell: /bin/bash -e {0}
  
