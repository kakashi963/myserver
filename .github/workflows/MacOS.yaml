name: MacRDP

on:
  workflow_dispatch:

jobs:
  build:
    name: MacRDP
    runs-on: macos-latest

    steps:

    - name: Connect to Tailscale
      uses: tailscale/github-action@v4
      with:
        authkey: ${{ secrets.TALESCALE_AUTH_KEY }}

    - name: Enable Screen Sharing (VNC)
      run: |
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpwd -vncpwd yourpassword \
          -restart -agent -privs -all

    - name: Enable SSH
      run: |
        sudo systemsetup -setremotelogin on

    - name: Log In Details To VNC Server
      run: |
        echo "===== Tailscale IP ====="
        tailscale ip -4
        echo "===== VNC Connection ====="
        echo "Host: $(tailscale ip -4)"
        echo "Port: 5900"
        echo "Password: yourpassword"
        echo "===== SSH Connection ====="
        echo "SSH: ssh runner@$(tailscale ip -4)"

    - name: macOS System Running...
      run: sleep 21600
