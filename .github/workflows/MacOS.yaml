name: MacRDP

on:
  workflow_dispatch:

jobs:
  macos-remote:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - name: Prepare Environment
        run: |
          echo "🏁 Starting macOS remote session setup"
          sw_vers
          whoami && id
          uname -a
          df -h /

      - name: Set runner User Password
        run: |
          echo "🔐 Setting runner user password..."

          # Method 1: sysadminctl (best method, no old password needed)
          sudo sysadminctl -resetPasswordFor runner -newPassword macvncpass 2>&1 && \
            echo "✅ sysadminctl succeeded" || echo "⚠️ sysadminctl failed, trying fallback..."

          # Method 2: expect + passwd fallback
          which expect || brew install expect
          sudo expect -c '
            spawn passwd runner
            expect "New password:"
            send "macvncpass\r"
            expect "Retype new password:"
            send "macvncpass\r"
            expect eof
          ' 2>&1 || echo "⚠️ expect fallback also failed"

          # Verify
          sudo dscl . -authonly runner macvncpass 2>&1 && \
            echo "✅ Password verified: macvncpass" || \
            echo "❌ Password verification failed"

      - name: Connect to Tailscale
        run: |
          set -e

          echo "🔍 Checking tailscale binary..."
          which tailscaled || brew install tailscale

          echo "🔑 Starting tailscaled daemon..."
          sudo tailscaled \
            --state=/tmp/tailscaled.state \
            --tun=userspace-networking > /tmp/tailscaled.log 2>&1 &
          sleep 6

          echo "--- tailscaled log ---"
          cat /tmp/tailscaled.log || true

          echo "🔐 Connecting to Tailscale..."
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=macos-gh-${GITHUB_RUN_ID} \
            --ssh \
            --accept-routes \
            --reset 2>&1 | tee /tmp/tailscale-up.log || true

          echo "--- tailscale up log ---"
          cat /tmp/tailscale-up.log || true

          TS_IP=""
          for i in $(seq 1 20); do
            TS_IP=$(sudo tailscale ip -4 2>/dev/null | head -n1 || true)
            if [ -n "$TS_IP" ]; then
              echo "✅ Tailscale IP: $TS_IP"
              echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
              break
            fi
            echo "⏳ Waiting for Tailscale IP... ($i/20)"
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "❌ Failed to get Tailscale IP"
            sudo tailscale status || true
            cat /tmp/tailscaled.log || true
            exit 1
          fi
        shell: bash

      - name: Enable SSH
        run: |
          echo "🔧 Enabling SSH..."
          sudo systemsetup -setremotelogin on 2>&1 || true
          sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist 2>&1 || true
          sleep 3

          if lsof -iTCP:22 -sTCP:LISTEN; then
            echo "✅ SSH listening on port 22"
          else
            echo "❌ SSH not listening on port 22"
          fi

      - name: Enable Screen Sharing (VNC)
        run: |
          echo "🖥  Enabling VNC Screen Sharing..."

          sudo defaults write /Library/Preferences/com.apple.RemoteManagement \
            VNCLegacyConnectionsAllowed -bool YES
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement \
            VNCAlwaysStartOnConsole -bool YES

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -allowAccessFor -allUsers \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpwd -vncpwd "macvncpass" \
            -restart -agent -privs -all 2>&1 || true

          sudo launchctl unload \
            /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>&1 || true
          sudo launchctl load -w \
            /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>&1 || true

          sleep 5

          if lsof -iTCP:5900 -sTCP:LISTEN; then
            echo "✅ VNC listening on port 5900"
          else
            echo "❌ VNC not on 5900"
            sudo launchctl list | grep -iE "screen|ard" || true
          fi

      - name: Verify All Services
        run: |
          echo "====== SERVICE VERIFICATION ======"

          echo "--- All TCP listeners ---"
          lsof -iTCP -sTCP:LISTEN || true

          echo "--- Tailscale status ---"
          sudo tailscale status 2>&1 || true

          echo "--- ARD / VNC processes ---"
          ps aux | grep -iE "vnc|ard|screensharing" | grep -v grep || true

          echo "--- runner user info ---"
          id runner || true
          sudo dscl . -read /Users/runner UserShell || true

      - name: Show Connection Details
        run: |
          TS_IP="${TAILSCALE_IP}"
          echo ""
          echo "======================================="
          echo "         macOS REMOTE ACCESS           "
          echo "======================================="
          echo "  Tailscale IP    : $TS_IP"
          echo "  VNC Port        : 5900"
          echo "  VNC Username    : runner"
          echo "  VNC Password    : macvncpass"
          echo "  SSH User        : runner"
          echo "  SSH Password    : macvncpass"
          echo "======================================="
          echo "  RealVNC         : $TS_IP:5900"
          echo "  SSH             : ssh runner@$TS_IP"
          echo "======================================="

      - name: Maintain Session
        run: |
          TS_IP="${TAILSCALE_IP}"
          while true; do
            echo "[$(date)] ✅ macOS alive — $TS_IP (SSH:22 | VNC:5900)"

            if ! lsof -iTCP:5900 -sTCP:LISTEN > /dev/null 2>&1; then
              echo "⚠️  VNC dropped, restarting..."
              sudo launchctl unload \
                /System/Library/LaunchDaemons/com.apple.screensharing.plist || true
              sudo launchctl load -w \
                /System/Library/LaunchDaemons/com.apple.screensharing.plist || true
              sleep 5
              lsof -iTCP:5900 -sTCP:LISTEN && echo "✅ VNC back up" || echo "❌ VNC still down"
            fi

            if ! lsof -iTCP:22 -sTCP:LISTEN > /dev/null 2>&1; then
              echo "⚠️  SSH dropped, restarting..."
              sudo launchctl load -w /System/Library/LaunchDaemons/ssh.plist || true
            fi

            sleep 300
          done
