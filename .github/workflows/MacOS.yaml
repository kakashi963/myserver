name: MacRDP
on:
  workflow_dispatch:

jobs:
  build:
    name: MacRDP
    runs-on: macos-latest
    timeout-minutes: 3600

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          brew install tailscale

      - name: Connect Tailscale
        run: |
          sudo tailscaled &
          sleep 5
          
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=macos-runner-$GITHUB_RUN_ID
          
          TS_IP=""
          RETRIES=0
          while [ -z "$TS_IP" ] && [ $RETRIES -lt 10 ]; do
            TS_IP=$(tailscale ip -4)
            sleep 5
            RETRIES=$((RETRIES + 1))
          done
          
          if [ -z "$TS_IP" ]; then
            echo "Tailscale IP not assigned. Exiting."
            exit 1
          fi
          
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV

      - name: Set SSH Password
        run: |
          # Use sysadminctl which doesn't require old password
          sudo sysadminctl -adminUser runner -adminPassword "" -resetPasswordFor runner -newPassword runner123
          # Also enable password auth in sshd
          sudo sed -i '' 's/^#PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i '' 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
          sudo launchctl stop com.openssh.sshd
          sudo launchctl start com.openssh.sshd
          echo "SSH Password set to: runner123"

      - name: Show Connection Info
        run: |
          echo ""
          echo "=== SSH ACCESS ==="
          echo "IP: $TAILSCALE_IP"
          echo "User: runner"
          echo "Password: runner123"
          echo "Command: ssh runner@$TAILSCALE_IP"
          echo "=================="
          echo ""

      - name: Keep Alive
        run: |
          while true; do
            echo "[$(date)] Runner active"
            sleep 300
          done
