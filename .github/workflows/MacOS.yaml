name: MacRDP

on:
  workflow_dispatch:

jobs:
  build:
    name: MacRDP
    runs-on: macos-latest

    steps:

    - name: Connect to Tailscale
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci

    - name: Enable Screen Sharing (VNC)
      run: |
        sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate -configure -access -on \
          -clientopts -setvnclegacy -vnclegacy yes \
          -clientopts -setvncpwd -vncpwd yourpassword \
          -restart -agent -privs -all

    - name: Enable SSH
      run: |
        sudo systemsetup -setremotelogin on

    - name: Show Tailscale IP & Login Info
      run: |
        echo "===== Tailscale IP ====="
        tailscale ip -4
        echo "===== VNC Connection ====="
        echo "VNC Host: $(tailscale ip -4)"
        echo "VNC Port: 5900"
        echo "VNC Password: yourpassword"
        echo "===== SSH Connection ====="
        echo "SSH: ssh runner@$(tailscale ip -4)"
        echo "macOS User: runner"

    - name: macOS System Running...
      run: |
        sleep 21600
